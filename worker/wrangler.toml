name = "kessan-tanshin-reader-proxy"
main = "src/index.ts"
compatibility_date = "2026-05-09"

[ai]
binding = "AI"

[vars]
CACHE_TTL_SECONDS = "300"
# Optional: comma-separated extra allowed hosts for company IR PDF domains.
ALLOWED_EXTRA_HOSTS = ""

# Durable Objects: IP単位レートリミッタ
# 複数インスタンス間で正しく共有される rate limit を実現する。
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v1"
new_classes = ["RateLimiterDO"]
